<!DOCTYPE html>
<html lang="en" light-mode="dark">

<head>
  <title>Ti Qin | Links</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index,follow">
  <meta name="description" content="A personal directory of useful websites and bookmarked resources.">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/preloader.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/bookmarks.css">
  <link rel="stylesheet" href="assets/css/cursor.css">
  <link id="favicon" rel="icon" href="assets/images/Cloud.PNG" type="image/png">
  <script defer src="./assets/js/dynamicTitle.js"></script>
</head>

<body class="no-scroll-preload">
  <div class="loader-container">
    <div class="atom">
      <div class="electron"></div>
      <div class="electron-alpha"></div>
      <div class="electron-omega"></div>
    </div>
  </div>

  <main class="bookmarks-page">
    <section class="bookmarks-hero">
      <p class="bookmarks-kicker">Personal Directory</p>
      <h1>Personal <span>Yellow Pages</span></h1>
      <p>
        A curated set of websites I return to for literature, genomics, coding, datasets, and writing.
      </p>
    </section>

    <section class="bookmarks-grid" id="bookmarks-grid" aria-label="Favorite websites">
    </section>
  </main>

  <div class="cursor-dot-outline"></div>
  <div class="cursor-dot"></div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/cursor.js"></script>
  <script src="assets/js/bookmarks.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>

</html>
